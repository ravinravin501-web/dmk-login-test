<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMK Google Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#7a0000,#d40000);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
padding:20px;
}

.login-box{
width:90%;
max-width:380px;
background:#111;
padding:30px;
border-radius:25px;
border:3px solid red;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

h1{
color:red;
margin-bottom:15px;
font-size:45px;
}

.quote{
color:#ffcccc;
font-size:18px;
line-height:1.8;
margin-bottom:12px;
font-style:italic;
text-shadow:0 0 10px rgba(255,255,255,0.2);
}

.sub-quote{
color:white;
font-size:16px;
line-height:1.9;
margin-bottom:25px;
opacity:0.9;
}

button{
width:100%;
padding:15px;
background:red;
border:none;
border-radius:12px;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#b30000;
}

#msg{
margin-top:20px;
font-weight:bold;
font-size:16px;
color:#ffb3b3;
}

.user-box{
margin-top:20px;
padding:20px;
background:#1b1b1b;
border-radius:15px;
display:none;
}

.user-box img{
width:90px;
height:90px;
border-radius:50%;
margin-bottom:15px;
border:3px solid red;
}

.user-box h2{
margin-bottom:10px;
color:red;
}

.home-btn{
display:inline-block;
margin-top:20px;
background:linear-gradient(135deg,#ff0000,#8b0000);
color:white;
padding:14px 28px;
border-radius:12px;
text-decoration:none;
font-size:18px;
font-weight:bold;
border:2px solid white;
box-shadow:0 0 15px rgba(255,0,0,0.5);
transition:0.3s;
}

.home-btn:hover{
background:linear-gradient(135deg,#ff1a1a,#b30000);
transform:scale(1.05);
}

</style>
</head>

<body>

<div class="login-box">

<h1>DMK LOGIN</h1>

<p class="quote">
“சமூகநீதி • சமத்துவம் • முன்னேற்றம்”
</p>

<p class="sub-quote">
இணைப்பில் இருங்கள் • மேலும் தகவல்களை பெற <br>
உடனுக்குடன் இணைய Login செய்யுங்கள்
</p>

<button onclick="googleLogin()">
Sign in with Google
</button>

<div id="msg"></div>

<div class="user-box" id="userBox">

<img id="userPhoto">

<h2 id="userName"></h2>

<p id="userEmail"></p>

<a href="https://dmk-it-wing-kanyakumari.netlify.app/"
class="home-btn">

🏠 Go To Home

</a>

</div>

</div>

<script type="module">

import { initializeApp }

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {

getAuth,
GoogleAuthProvider,
signInWithPopup

}

from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDJKendlccbZ040udTy6abbOqlVH_gzNxU",

authDomain: "dmk-login-30050.firebaseapp.com",

projectId: "dmk-login-30050",

storageBucket: "dmk-login-30050.firebasestorage.app",

messagingSenderId: "592304719281",

appId: "1:592304719281:web:60279cc907aaab8d3ea990",

measurementId: "G-0DH04MNVYY"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

const provider = new GoogleAuthProvider();

window.googleLogin = async function(){

try{

const result = await signInWithPopup(auth, provider);

const user = result.user;

document.getElementById("msg").innerHTML =
"Login Successful ✅";

document.getElementById("userBox").style.display =
"block";

document.getElementById("userPhoto").src =
user.photoURL;

document.getElementById("userName").innerHTML =
user.displayName;

document.getElementById("userEmail").innerHTML =
user.email;

}catch(error){

document.getElementById("msg").innerHTML =
error.message;

}

};

</script>

</body>
</html>
