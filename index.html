<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>DMK Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#000,#7a0000,#d40000);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
color:white;
}

.login-box{
width:90%;
max-width:380px;
background:#111;
padding:30px;
border-radius:25px;
border:3px solid red;
text-align:center;
box-shadow:0 0 25px rgba(255,0,0,0.5);
}

h1{
color:red;
margin-bottom:15px;
}

p{
margin-bottom:20px;
}

input{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:10px;
font-size:16px;
}

button{
width:100%;
padding:14px;
background:red;
border:none;
border-radius:10px;
color:white;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

#msg{
margin-top:15px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="login-box">

<h1>DMK LOGIN</h1>

<p>மின்னஞ்சல் மூலம் உள்நுழையவும்</p>

<input type="email" id="email" placeholder="Enter Gmail">

<button onclick="sendLink()">
Send Login Link
</button>

<div id="msg"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.13.0/firebase-app.js";

import {
getAuth,
sendSignInLinkToEmail,
isSignInWithEmailLink,
signInWithEmailLink

} from "https://www.gstatic.com/firebasejs/12.13.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyDJKendlccbZ040udTy6abbOqlVH_gzNxU",

authDomain: "dmk-login-30050.firebaseapp.com",

projectId: "dmk-login-30050",

storageBucket: "dmk-login-30050.firebasestorage.app",

messagingSenderId: "592304719281",

appId: "1:592304719281:web:60279cc907aaab8d3ea990",

measurementId: "G-0DH04MNVYY"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.sendLink = async function(){

const email = document.getElementById("email").value;

const actionCodeSettings = {

url: window.location.href,

handleCodeInApp: true,

};

try{

await sendSignInLinkToEmail(
auth,
email,
actionCodeSettings
);

window.localStorage.setItem(
'emailForSignIn',
email
);

document.getElementById("msg").innerHTML =
"Login link sent to Gmail ✅";

}catch(error){

document.getElementById("msg").innerHTML =
error.message;

}

};

if(isSignInWithEmailLink(auth, window.location.href)){

let email = window.localStorage.getItem(
'emailForSignIn'
);

await signInWithEmailLink(
auth,
email,
window.location.href
);

document.body.innerHTML = `
<div style="
display:flex;
justify-content:center;
align-items:center;
height:100vh;
background:black;
color:white;
font-size:28px;
font-weight:bold;
">
Login Successful ✅
</div>
`;

}

</script>

</body>
</html>
