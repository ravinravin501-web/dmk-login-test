<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DMK Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#000,#7a0000);
    color:white;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.box{
    width:90%;
    max-width:400px;
    background:#111;
    padding:30px;
    border-radius:25px;
    border:3px solid red;
    box-shadow:0 0 25px red;
}

button{
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:10px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
    <h1>Login Successful ✅</h1>
    <p>DMK Website Dashboard</p>
    <p>உங்கள் உள்நுழைவு வெற்றிகரமாக முடிந்தது.</p>

    <button onclick="logout()">Logout</button>
</div>

<script>
if(localStorage.getItem("dmkLogin") !== "true"){
    window.location.href = "index.html";
}

function logout(){
    localStorage.removeItem("dmkLogin");
    window.location.href = "index.html";
}
</script>

</body>
</html>
